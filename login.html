<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OurWorlds Login</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Quicksand', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #1a0033, #000814);
        overflow: hidden;
        position: relative;
        color: white;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 1;
        background: rgba(20, 0, 40, 0.85);
        border: 2px solid #9d7bff;
        border-radius: 25px;
        padding: 40px;
        width: 320px;
        text-align: center;
        box-shadow: 0 0 25px rgba(157, 123, 255, 0.6);
        backdrop-filter: blur(10px);
    }

    .logo-area img {
        width: 60px;
        height: 60px;
        margin-bottom: 10px;
    }

    .logo-text {
        font-size: 26px;
        font-weight: bold;
        text-shadow: 0 0 10px #9d7bff;
    }

    .subtitle {
        font-size: 13px;
        margin-bottom: 25px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 2px solid #3a2b66;
        border-radius: 12px;
        background: #0d0221;
        color: white;
    }

    input:focus {
        border-color: #9d7bff;
        box-shadow: 0 0 8px #9d7bff;
        outline: none;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background: linear-gradient(90deg, #9d7bff, #5ecbff);
        border: none;
        border-radius: 15px;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px #9d7bff;
    }

    .links {
        margin-top: 15px;
        font-size: 12px;
    }

    .links a {
        color: #c6b3ff;
        text-decoration: none;
    }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
    <div class="logo-area">
        <img src="logo.png" alt="Logo">
        <div class="logo-text">OurWorlds</div>
    </div>
    <div class="subtitle">log into your universe ✨</div>

    <form onsubmit="return login(event)">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Enter Orbit 🚀</button>
    </form>

    <div class="links">
        <p><a href="#">Forgot password?</a></p>
        <p>New here? <a href="register.html">Create an account</a></p>
    </div>
</div>

<script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createStars(count) {
        stars = [];
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5 + 0.5,
                vx: (Math.random() - 0.5) * 0.1, // slower
                vy: (Math.random() - 0.5) * 0.1, // slower
                glow: Math.random() * 1.5 + 0.5
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let star of stars) {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,0.4)`; // subtle
            ctx.shadowColor = '#c6b3ff';
            ctx.shadowBlur = star.glow;
            ctx.fill();

            star.x += star.vx;
            star.y += star.vy;

            if (star.x < 0) star.x = canvas.width;
            if (star.x > canvas.width) star.x = 0;
            if (star.y < 0) star.y = canvas.height;
            if (star.y > canvas.height) star.y = 0;
        }
        requestAnimationFrame(drawStars);
    }

    createStars(300);
    drawStars();

    // LOGIN FUNCTION
    function login(e) {
        e.preventDefault();

        const username = document.querySelector('input[type="text"]').value;
        const password = document.querySelector('input[type="password"]').value;

        if (username === "ilikespongebob4" && password === "frankieroisawesome123") {
            window.location.href = "homepage.html";
        } else {
            alert("Invalid username or password");
        }
    }
</script>

</body>
</html>
