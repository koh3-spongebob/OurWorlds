<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OurWorlds Home</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: 'Quicksand', sans-serif;
        overflow: hidden;
        background: radial-gradient(circle at top, #1a0033, #000814);
        color: white;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    /* Sidebar */
    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 220px;
        height: 100vh;
        background: rgba(20, 0, 40, 0.9);
        border-right: 2px solid #9d7bff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 30px;
        box-shadow: 0 0 20px rgba(157,123,255,0.5);
        z-index: 1;
    }

    .logo {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        border: 2px solid #9d7bff;
        margin-bottom: 15px;
        box-shadow: 0 0 10px #9d7bff;
    }

    .username {
        text-align: center;
        margin-bottom: 25px;
    }

    .username img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid #9d7bff;
        box-shadow: 0 0 8px #9d7bff;
        margin-bottom: 5px;
    }

    .username div {
        text-shadow: 0 0 8px #9d7bff;
    }

    .sidebar button {
        width: 85%;
        padding: 10px;
        margin: 6px 0;
        border: none;
        border-radius: 12px;
        background: linear-gradient(90deg, #9d7bff, #5ecbff);
        color: white;
        cursor: pointer;
        font-size: 13px;
    }

    .sidebar button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px #9d7bff;
    }

    /* Main */
    .main {
        margin-left: 220px;
        padding: 20px;
        position: relative;
        z-index: 1;
    }

    .search-bar {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
    }

    .search-bar input {
        width: 70%;
        padding: 10px;
        border-radius: 15px;
        border: 2px solid #3a2b66;
        background: #0d0221;
        color: white;
    }

    .planet {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: radial-gradient(circle, #9d7bff, #1a0033);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 15px #9d7bff;
    }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="planet">#Earth</div>

<div class="sidebar">
    <img class="logo" src="logo.png">
    <div class="username">
        <img src="profile.png">
        <div id="usernameDisplay">User</div>
    </div>

    <button>Profile</button>
    <button>Notifications</button>
    <button>Friends</button>
    <button>Worlds</button>
    <button>Constellations</button>
    <button>Settings</button>
</div>

<div class="main">
    <div class="search-bar">
        <input type="text" placeholder="Search OurWorlds...">
    </div>
</div>

<script>
    // get username from login
    const user = localStorage.getItem("ourworlds_user");
    if (user) {
        document.getElementById("usernameDisplay").innerText = user;
    }

    // starfield
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createStars(count) {
        stars = [];
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5 + 0.5,
                vx: (Math.random() - 0.5) * 0.1,
                vy: (Math.random() - 0.5) * 0.1,
                glow: Math.random() * 1.5 + 0.5
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let star of stars) {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,0.4)`;
            ctx.shadowColor = '#c6b3ff';
            ctx.shadowBlur = star.glow;
            ctx.fill();

            star.x += star.vx;
            star.y += star.vy;

            if (star.x < 0) star.x = canvas.width;
            if (star.x > canvas.width) star.x = 0;
            if (star.y < 0) star.y = canvas.height;
            if (star.y > canvas.height) star.y = 0;
        }
        requestAnimationFrame(drawStars);
    }

    createStars(400);
    drawStars();
</script>

</body>
</html>
