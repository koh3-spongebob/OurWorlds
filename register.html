<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OurWorlds Home</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: 'Quicksand', sans-serif;
        overflow: hidden;
        background: radial-gradient(circle at top, #1a0033, #000814);
        color: white;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 220px;
        height: 100vh;
        background: linear-gradient(145deg, #2b2b2b, #1a1a1a);
        border-right: 3px solid #9d7bff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 30px;
        box-shadow: inset 0 0 15px #5ecbff, 0 0 20px rgba(0,0,0,0.7);
        backdrop-filter: blur(5px);
        z-index: 1;
        font-weight: bold;
    }

    .sidebar .logo {
        width: 60px;
        height: 60px;
        margin-bottom: 15px;
        border: 2px solid #5ecbff;
        border-radius: 12px;
        box-shadow: 0 0 10px #5ecbff;
    }

    .sidebar .username {
        text-align: center;
        margin-bottom: 25px;
    }

    .sidebar .username img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid #9d7bff;
        box-shadow: 0 0 8px #9d7bff;
        margin-bottom: 5px;
    }

    .sidebar button {
        width: 90%;
        padding: 12px;
        margin: 6px 0;
        border: none;
        border-radius: 10px;
        background: linear-gradient(145deg, #3a3a3a, #1f1f1f);
        color: #c6b3ff;
        cursor: pointer;
        text-align: left;
        padding-left: 15px;
        box-shadow: 0 0 8px #5ecbff, inset 0 0 5px #9d7bff;
        transition: all 0.2s ease-in-out;
        font-size: 14px;
    }

    .sidebar button:hover {
        background: linear-gradient(145deg, #5a5a5a, #2a2a2a);
        color: white;
        box-shadow: 0 0 15px #9d7bff, inset 0 0 10px #5ecbff;
        transform: scale(1.05);
    }

    .main {
        margin-left: 220px;
        padding: 20px;
        height: 100vh;
        overflow-y: auto;
        position: relative;
        z-index: 1;
    }

    .search-bar {
        display: flex;
        margin-bottom: 20px;
        justify-content: center;
    }

    .search-bar input {
        width: 80%;
        padding: 12px;
        border-radius: 15px;
        border: 2px solid #3a2b66;
        background: #0d0221;
        color: white;
        font-size: 14px;
    }

    .planet-indicator {
        position: fixed;
        top: 20px;
        right: 20px;
        background: radial-gradient(circle, #5ecbff, #1a0033);
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid #9d7bff;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        color: white;
        box-shadow: 0 0 15px #5ecbff;
        z-index: 1;
    }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="planet-indicator">#Earth</div>

<div class="sidebar">
    <img class="logo" src="logo.png" alt="OurWorlds Logo">
    <div class="username">
        <img src="profile.png" alt="Profile">
        <div>SpaceCadet99</div>
    </div>
    <button>Profile</button>
    <button>Notifications</button>
    <button>Friends</button>
    <button>Worlds</button>
    <button>Constellations</button>
    <button>Settings</button>
</div>

<div class="main">
    <div class="search-bar">
        <input type="text" placeholder="Search OurWorlds...">
    </div>
</div>

<script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createStars(count) {
        stars = [];
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5 + 0.5,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                glow: Math.random() * 1.5 + 0.5
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let star of stars) {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,0.8)`;
            ctx.shadowColor = '#c6b3ff';
            ctx.shadowBlur = star.glow;
            ctx.fill();

            star.x += star.vx;
            star.y += star.vy;

            if (star.x < 0) star.x = canvas.width;
            if (star.x > canvas.width) star.x = 0;
            if (star.y < 0) star.y = canvas.height;
            if (star.y > canvas.height) star.y = 0;
        }
        requestAnimationFrame(drawStars);
    }

    createStars(400);
    drawStars();
</script>

</body>
</html>
